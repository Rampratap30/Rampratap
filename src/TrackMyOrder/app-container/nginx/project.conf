limit_req_zone $binary_remote_addr zone=api_call_limit:10m rate=10r/s;
server {

    listen 80;
    #server_name localhost;	
    client_body_timeout 5s;
    client_header_timeout 5s;
    client_body_buffer_size 1k;
    client_header_buffer_size 1k;
	ssl_ciphers ALL:!CBC;

	add_header 'X-Content-Type-Options'  'nosniff';
    add_header 'X-Frame-Options' 'SAMEORIGIN';
    add_header 'X-XSS-Protection' '1; mode=block';
    add_header 'Strict-Transport-Security' 'max-age=31536000; includeSubDomains; preload';
    add_header 'Cache-control' 'no-cache';	
    #add_header 'Content-Security-Policy' "default-src 'none'; font-src 'self'; img-src 'self'; script-src 'self'; style-src 'self'; frame-src 'self'";
    add_header 'Permissions-Policy' 'camera=(), geolocation=(), microphone=()';
    add_header 'Referrer-Policy' 'same-origin';

    location / {
        root /sites;
        try_files $uri /index.html?$args;
		#proxy_cookie_path /trackmyorder "/; HTTPOnly; Secure";
    }

    location /api/home/getdata {
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Server $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
		limit_req zone=api_call_limit burst=5 nodelay;

        #proxy_pass http://aue1ecsd02-node1.ricohonline.org:8773; #Dev
        #proxy_pass http://aue1ecsq01-node1.ricohonline.org:8773;  #QA
        #proxy_pass http://aue1ecsu01-node1.ricohonline.org:8773;  #Uat
        proxy_pass http://aue1ecsp02-node1.ricohonline.org:8773;  #Prod
        #proxy_pass http://host.docker.internal:8773;
		
		#proxy_cookie_path /trackmyorder "/; HTTPOnly; Secure";
		
		proxy_pass_header Server;
    }

    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg)$ {
        root /sites/static;
        sendfile on;
        include /etc/nginx/mime.types;
        expires 1d;
        add_header Cache-Control public;
        add_header Pragma public;
        add_header Vary Accept-Encoding;
    }

    #    location /assets/icons/ {
    #        include /etc/nginx/mime.types;
    #        alias /assets/icons/;
    #    }
    # location /{
    #         try_files $uri $uri/ ceft_app/index.html?/$request_uri;
    #   }
}
