<section class="main">
  <div class="container mb-2">
    <div class="col-sm-12 page-head">
      <a routerLink="/home" class="page-head-link-active"> Home </a>
      <span style="font-size: 1.1rem">></span>
    </div>
  </div>
  <div class="container mb-2">
    <div class="col-sm-12 bg-white c-border p-3 mb-2">
      <form [formGroup]="frm" (ngSubmit)="onSearchSubmit()" autocomplete="off">
        <div class="row">
          <div class="col-sm-6 ps-4 mb-2">
            <div class="row">
              <label for="inputManagerName" class="col-sm-4 col-form-label">
                Manager Name
              </label>
              <div class="col-sm-6 pe-0">
                <input
                  type="text"
                  class="form-control"
                  id="inputManagerName"
                  formControlName="managerName"
                />
              </div>
              <div class="col-sm-2">
                <button
                  (click)="openSearchDialogManager('managerName')"
                  type="button"
                  class="btn btn-danger mb-2"
                  data-bs-toggle="modal"
                  data-bs-target="#staticBackdrop1"
                >
                  <i class="bi bi-search"></i>
                </button>
              </div>
            </div>
          </div>
          <div class="col-sm-6 ps-4 mb-2">
            <div class="row">
              <label for="inputEmployeeName" class="col-sm-4 col-form-label">
                Employee
              </label>
              <div class="col-sm-6 pe-0">
                <input
                  type="text"
                  class="form-control"
                  id="inputEmployeeName"
                  formControlName="empName"
                />
              </div>
              <div class="col-sm-2">
                <button
                  (click)="openSearchDialog('empName')"
                  type="button"
                  class="btn btn-danger mb-2"
                  data-bs-toggle="modal"
                  data-bs-target="#staticBackdrop"
                >
                  <i class="bi bi-search"></i>
                </button>
              </div>
            </div>
          </div>
          <div class="col-sm-12 d-flex justify-content-center">
            <button
              [disabled]="!f['managerName'].value && !f['empName'].value"
              type="submit"
              class="btn btn-outline-danger me-3"
            >
              Search
            </button>
            <button
              (click)="clearData()"
              type="button"
              class="btn btn-outline-danger me-3"
            >
              Reset
            </button>
          </div>
        </div>
      </form>
    </div>
  </div>
  <div class="container">
    <hr class="mb-2 mt-2" />
    <div class="col-sm-12 mb-2">
      <button
        [disabled]="btnDisabled"
        (click)="onBtRequestChanges(content2)"
        type="button"
        class="btn btn-outline-danger me-3"
      >
        Request Changes
      </button>
      <button
        [disabled]="btnDisabled"
        (click)="onBtTransfer(content)"
        type="button"
        class="btn btn-outline-danger me-3"
      >
        Transfer
      </button>
      <button
        (click)="onBtExport()"
        type="button"
        class="btn btn-outline-danger me-3"
        [disabled]="btnDisableds"
      >
        Export to CSV
      </button>
      <button
        *ngIf="getRole == 'ADMIN'"
        (click)="onBtExportBulk()"
        type="button"
        class="btn btn-outline-danger me-3"
      >
        Bulk Export to CSV
      </button>
      <button
        (click)="onBtAddEmployee()"
        type="button"
        class="btn btn-outline-danger"
      >
        Add Employee
      </button>
    </div>
  </div>
  <div class="container">
    <div class="row">
      <div class="col-lg-12">
        <ag-grid-angular
          [rowData]="rowData"
          [columnDefs]="columnDefs"
          [gridOptions]="gridOptions"
          [pagination]="true"
          [paginationPageSize]="defaultPageSize"
          [cacheBlockSize]="defaultPageSize"
          [suppressRowClickSelection]="true"
          [rowSelection]="rowSelection"
          [enableCellTextSelection]="true"
          (gridReady)="onGridReady($event)"
          (selectionChanged)="onSelectionChanged($event)"
          style="width: 100%"
          domLayout="autoHeight"
          class="ag-theme-alpine"
        >
        </ag-grid-angular>
        <!-- [enableRangeSelection]="true" -->
      </div>
    </div>

    <!-- <div 
		*ngIf="this.getRole == 'NORMAL'"
			class="row">
			<div class="col-lg-12">
				<ag-grid-angular [enableCellTextSelection]="true"
					[rowData]="rowData"
					[columnDefs]="columnDefs"
					(gridReady)="onGridReady($event)"
					style="height: 500px; width: 100%"
					class="ag-theme-alpine">
				</ag-grid-angular>
			</div>
		</div> -->
  </div>
</section>
<div
  class="modal fade"
  id="staticBackdrop1"
  data-bs-backdrop="static"
  data-bs-keyboard="false"
  tabindex="-1"
  aria-labelledby="staticBackdropLabel"
  aria-hidden="true"
>
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="staticBackdropLabel">Managers List</h5>
        <button
          #closebutton1
          type="button"
          class="btn-close"
          data-bs-dismiss="modal"
          aria-label="Close"
        ></button>
      </div>
      <div class="modal-body">
        <div class="col-lg-12">
          <ag-grid-angular
            [pagination]="true"
            [paginationPageSize]="defaultDialogSize"
            [cacheBlockSize]="defaultDialogSize"
            [columnDefs]="managercolumnDefs"
            [defaultColDef]="defaultColDef"
            [rowSelection]="rowSelectionDialog"
            [rowData]="managerData"
            [enableCellTextSelection]="true"
            (selectionChanged)="onSelectionChangedDialogM($event)"
            (gridReady)="onGridReadyDialogM($event)"
            style="width: 100%"
            domLayout="autoHeight"
            class="ag-theme-alpine"
            rowModelType="infinite"
          ></ag-grid-angular>
        </div>
      </div>
    </div>
  </div>
</div>

<div
  class="modal fade"
  id="staticBackdrop"
  data-bs-backdrop="static"
  data-bs-keyboard="false"
  tabindex="-1"
  aria-labelledby="staticBackdropLabel"
  aria-hidden="true"
>
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="staticBackdropLabel">Employee List</h5>
        <button
          #closebutton
          type="button"
          class="btn-close"
          data-bs-dismiss="modal"
          aria-label="Close"
        ></button>
      </div>
      <div class="modal-body">
        <div class="col-lg-12">
          <ag-grid-angular
            [pagination]="true"
            [paginationPageSize]="defaultDialogSize"
            [cacheBlockSize]="defaultDialogSize"
            [columnDefs]="employeecolumnDefs"
            [defaultColDef]="defaultColDef"
            [rowSelection]="rowSelectionDialog"
            [rowData]="employeeData"
            (selectionChanged)="onSelectionChangedDialog($event)"
            (gridReady)="onGridReadyDialog($event)"
            style="width: 100%"
            domLayout="autoHeight"
            class="ag-theme-alpine"
            rowModelType="infinite"
          ></ag-grid-angular>
        </div>
      </div>
    </div>
  </div>
</div>
<ng-template #content let-modal>
  <div class="modal-header">
    <h4 class="modal-title" id="modal-basic-title">Update Manager</h4>
    <button
      (click)="onTransferCancel()"
      type="button"
      class="btn-close"
      aria-label="Close"
    ></button>
  </div>
  <div class="modal-body">
    <div class="col-lg-12">
      <form
        [formGroup]="frmTran"
        (ngSubmit)="onSubmitTransfer()"
        autocomplete="off"
      >
        <div class="row mb-2">
          <label for="inputCurrentManager" class="col-sm-4 col-form-label">
            Current Manager
          </label>
          <div class="col-sm-8">
            <input
              type="text"
              formControlName="currentManager"
              class="form-control"
              id="inputCurrentManager"
              [readonly]="true"
            />
          </div>
        </div>
        <div class="row mb-2">
          <label class="col-sm-4 col-form-label">New Manager</label>
          <div class="col-sm-8">
            <ngx-select
              [allowClear]="true"
              [items]="selectItems"
              formControlName="newManager"
              optionValueField="manager_id"
              optionTextField="manager_name"
              placeholder="Select"
            >
            </ngx-select>
          </div>
        </div>
        <div class="row mb-2">
          <label for="eDate" class="col-sm-4 col-form-label">
            Effective Date
          </label>
          <div class="col-sm-8">
            <div class="input-group">
              <input
                #d="ngbDatepicker"
                id="eDate"
                class="form-control"
                placeholder="mm/dd/yyyy"
                name="dp"
                formControlName="eDate"
                ngbDatepicker
              />
              <button
                (click)="d.toggle()"
                class="btn btn-outline-secondary bi bi-calendar3"
                type="button"
              ></button>
            </div>
          </div>
        </div>
      </form>
    </div>
  </div>
  <div class="modal-footer">
    <button
      [disabled]="frmTran.invalid"
      (click)="onSubmitTransfer()"
      type="submit"
      class="btn btn-danger me-3"
    >
      Submit
    </button>
    <button type="button" (click)="onTransferCancel()" class="btn btn-danger">
      Cancel
    </button>
  </div>
</ng-template>

<ng-template #content2 let-modal>
  <div class="modal-header">
    <h4 class="modal-title" id="modal-basic-title">
      Request Changes - {{ rc_employee_name }}
    </h4>
    <button
      type="button"
      class="btn-close"
      aria-label="Close"
      (click)="modal.dismiss('Cross click')"
    ></button>
  </div>
  <div class="modal-body">
    <div class="col-lg-12">
      <button type="button" class="btn btn btn-outline-danger mb-2">
        <a routerLink="{{ '/editEmployee/' + encoded_employee_id }}">Add</a>
      </button>
      <span style="font-weight: bolder"> HR Status : {{ rc_hr_status }} </span>
      <ag-grid-angular
        style="height: 400px; width: 100%"
        class="ag-theme-alpine"
        [columnDefs]="columnDefsR"
        [defaultColDef]="defaultColDef"
        rowModelType="infinite"
        [rowSelection]="rowSelectionDialog"
        [rowData]="rowDataR"
        (selectionChanged)="onSelectionChangedChangeR($event)"
        (gridReady)="onGridReadyChangeR($event)"
      ></ag-grid-angular>
    </div>
  </div>

    <button type="submit" class="btn btn btn-outline-danger me-3" (click)="modal.close('Save click')">Submit</button>
    <button type="button" class="btn btn btn-outline-danger me-3" (click)="modal.close('Save click')">Cancel</button>
	</div> -->
</ng-template>
